<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>관련기관 — 한국문화기획학교</title>
<meta name="description" content="한국문화기획학교와 함께하는 관련기관·자매 브랜드를 소개합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="partners">

<header class="site-header" id="site-header"></header>

<main>
  <section class="page-hero ambient">
    <div class="page-hero-ambient-bg" aria-hidden="true"><span class="blob-1"></span><span class="blob-2"></span></div>
    <div class="wrap">
      <p class="eyebrow">관련기관</p>
      <h1>함께하는 기관·브랜드</h1>
      <p class="lede">한국문화기획학교와 함께 문화기획·축제·지역문화 생태계를 만들어가는 관련기관입니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div id="partnersList" style="display:flex; flex-direction:column; gap:20px;">
        <p>관련기관 정보를 불러오는 중입니다…</p>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>
<script src="/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const data = await loadJSON('/content/data/partners.json');
  const host = document.getElementById('partnersList');
  if(!data || !data.items || !data.items.length){
    host.innerHTML = `<div class="empty-note">아직 등록된 관련기관이 없습니다. 관리자 페이지(/admin)에서 추가해 주세요.</div>`;
    return;
  }
  host.innerHTML = data.items.map(p => `
    <div class="partner-card">
      <div>
        <p class="eyebrow" style="color:var(--stamp);">${escapeHTML(p.tagline || '관련기관')}</p>
        <h3>${escapeHTML(p.name || '')}</h3>
        <p>${escapeHTML(p.description || '')}</p>
      </div>
      ${p.url ? `<a class="btn" href="${encodeURI(p.url)}" target="_blank" rel="noopener">${escapeHTML(p.url.replace(/^https?:\/\//,''))} 방문 →</a>` : ''}
    </div>
  `).join('');
});
</script>
</body>
</html>
