<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>회원 전용 — 한국문화기획학교</title>
<meta name="description" content="한국문화기획학교 회원 전용 자료실입니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="/css/style.css">
<style>
  .member-gate{ text-align:center; padding:60px 20px; border:1px dashed var(--line-strong); border-radius:16px; max-width:420px; margin:0 auto; }
  .member-gate p{ color:var(--ink-soft); margin-bottom:20px; }
  .member-gate input{
    width:100%; padding:12px 16px; border:1px solid var(--line-strong); border-radius:8px;
    font-size:1rem; margin-bottom:14px; text-align:center; letter-spacing:.1em;
  }
  .member-gate .error{ color:var(--stamp); font-size:.86rem; margin-top:-6px; margin-bottom:14px; display:none; }
  .member-topbar{ display:flex; justify-content:flex-end; margin-bottom:24px; }
  .resource-card{ border:1px solid var(--line); border-radius:12px; padding:20px 24px; margin-bottom:14px; }
  .resource-card h3{ margin:0 0 6px; font-size:1.05rem; }
  .resource-card .date{ font-family:var(--mono); font-size:.72rem; color:var(--ink-soft); }
  .resource-card p{ margin:8px 0 0; font-size:.92rem; }
  .resource-card .links{ margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }
</style>
</head>
<body data-page="members">

<header class="site-header" id="site-header"></header>

<main>
  <section class="page-hero ambient">
    <div class="page-hero-ambient-bg" aria-hidden="true"><span class="blob-1"></span><span class="blob-2"></span></div>
    <div class="wrap">
      <p class="eyebrow">회원 전용</p>
      <h1>회원 자료실</h1>
      <p class="lede">한국문화기획학교 회원만 열람 가능한 자료·영상입니다. 접속 코드를 입력해 주세요.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div id="gate" class="member-gate">
        <p>회원 전용 접속 코드를 입력해 주세요. 코드를 모르시면 사무국으로 문의해 주세요.</p>
        <input type="password" id="passcodeInput" placeholder="접속 코드" autocomplete="off">
        <p class="error" id="passcodeError">코드가 올바르지 않습니다. 다시 확인해 주세요.</p>
        <button class="btn primary" id="unlockBtn" style="width:100%; justify-content:center;">입장하기</button>
      </div>

      <div id="resourceWrap" style="display:none; max-width:760px; margin:0 auto;">
        <div class="member-topbar"><a href="#" class="btn" id="lockBtn">잠그기</a></div>
        <div id="resourceList"></div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>
<script src="/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const gate = document.getElementById('gate');
  const wrap = document.getElementById('resourceWrap');
  const input = document.getElementById('passcodeInput');
  const errorEl = document.getElementById('passcodeError');
  const unlockBtn = document.getElementById('unlockBtn');
  const lockBtn = document.getElementById('lockBtn');
  const STORE_KEY = 'kacs_member_unlocked';

  async function renderResources(){
    const data = await loadJSON('/content/data/member-resources.json');
    const list = document.getElementById('resourceList');
    if(!data || !data.items || !data.items.length){
      list.innerHTML = `<div class="empty-note">아직 등록된 회원 자료가 없습니다. 관리자 페이지(/admin → 회원 전용 자료)에서 추가해 주세요.</div>`;
      return;
    }
    const sorted = [...data.items].sort((a,b) => (b.date||'').localeCompare(a.date||''));
    list.innerHTML = sorted.map(r => `
      <div class="resource-card">
        <span class="date">${escapeHTML(r.date||'')}</span>
        <h3>${escapeHTML(r.title||'')}</h3>
        ${r.description ? `<p>${escapeHTML(r.description)}</p>` : ''}
        <div class="links">
          ${r.fileUrl ? `<a class="btn" href="${encodeURI(r.fileUrl)}" target="_blank" rel="noopener">첨부 파일 보기</a>` : ''}
          ${r.videoUrl ? `<a class="btn" href="${encodeURI(r.videoUrl)}" target="_blank" rel="noopener">영상 보기</a>` : ''}
        </div>
      </div>
    `).join('');
  }

  function unlock(){
    gate.style.display = 'none';
    wrap.style.display = 'block';
    renderResources();
  }
  function lock(){
    sessionStorage.removeItem(STORE_KEY);
    gate.style.display = 'block';
    wrap.style.display = 'none';
    input.value = '';
  }

  async function tryUnlock(){
    const cfg = await loadJSON('/content/data/members-config.json');
    const correct = (cfg && cfg.passcode) || '';
    if(input.value.trim() && input.value === correct){
      sessionStorage.setItem(STORE_KEY, '1');
      errorEl.style.display = 'none';
      unlock();
    } else {
      errorEl.style.display = 'block';
    }
  }

  unlockBtn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter') tryUnlock(); });
  lockBtn.addEventListener('click', (e) => { e.preventDefault(); lock(); });

  if(sessionStorage.getItem(STORE_KEY) === '1'){ unlock(); }
});
</script>
</body>
</html>
