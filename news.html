<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>소식 — 한국문화기획학교</title>
<meta name="description" content="한국문화기획학교의 공지사항과 소식을 확인하세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="news">

<header class="site-header" id="site-header"></header>

<main>
  <section class="page-hero">
    <div class="wrap">
      <p class="eyebrow">소식</p>
      <h1>공지사항</h1>
      <p class="lede">살롱 운영 안내, 프로그램 모집, 학교 소식을 전해드립니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="news-list" id="newsList">
        <p>소식을 불러오는 중입니다…</p>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>
<script src="/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const data = await loadJSON('/content/data/news.json');
  const host = document.getElementById('newsList');
  if(!data || !data.items || !data.items.length){
    host.innerHTML = `<div class="empty-note">아직 등록된 소식이 없습니다. 관리자 페이지(/admin)에서 새 소식을 추가해 주세요.</div>`;
    return;
  }
  const sorted = [...data.items].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  host.innerHTML = sorted.map(n => `
    <div class="news-row">
      <span class="date">${escapeHTML(n.date||'')}</span>
      <div>
        <h3>${escapeHTML(n.title||'')}</h3>
        ${n.body ? `<p style="margin-top:6px; font-size:.9rem; white-space:pre-line;">${escapeHTML(n.body)}</p>` : ''}
        ${n.link ? `<p style="margin-top:10px;"><a class="btn" href="${encodeURI(n.link)}" target="_blank" rel="noopener">${escapeHTML(n.linkLabel || '바로가기')} ↗</a></p>` : ''}
      </div>
      <span class="tag">${escapeHTML(n.tag||'')}</span>
    </div>
  `).join('');
});
</script>
</body>
</html>
