<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문의하기 — 한국문화기획학교</title>
<meta name="description" content="한국문화기획학교에 궁금한 점을 남겨주세요. 문의 내용은 관리자만 확인할 수 있습니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="inquiry">

<header class="site-header" id="site-header"></header>

<main>
  <section class="page-hero ambient">
    <div class="page-hero-ambient-bg" aria-hidden="true"><span class="blob-1"></span><span class="blob-2"></span></div>
    <div class="wrap">
      <p class="eyebrow">문의하기</p>
      <h1>궁금한 점을 남겨주세요</h1>
      <p class="lede">프로그램 참여, 협업 제안, 후원 등 무엇이든 편하게 남겨주세요. 남겨주신 내용은 홈페이지에 공개되지 않으며, 사무국 관리자만 확인합니다.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <div class="notice-box">문의 내용은 비공개로 접수되며, 관리자 로그인이 필요한 별도 화면에서만 확인할 수 있습니다.</div>

      <form class="form-card" name="inquiry" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/inquiry-success.html">
        <input type="hidden" name="form-name" value="inquiry">
        <p style="display:none;">
          <label>이 필드는 비워두세요: <input name="bot-field"></label>
        </p>

        <div class="field-row">
          <div class="field">
            <label for="name">이름</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="email">이메일</label>
            <input id="email" name="email" type="email" required>
          </div>
        </div>

        <div class="field">
          <label for="phone">연락처 (선택)</label>
          <input id="phone" name="phone" type="tel">
        </div>

        <div class="field">
          <label for="category">문의 유형</label>
          <select id="category" name="category">
            <option>프로그램 참여 문의</option>
            <option>후원·기부 문의</option>
            <option>협업·컨설팅 제안</option>
            <option>기타</option>
          </select>
        </div>

        <div class="field">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <label class="consent">
          <input type="checkbox" required>
          <span>문의 처리를 위해 위 정보를 수집·이용하는 것에 동의합니다.</span>
        </label>

        <div class="cta-row" style="margin-top:22px;">
          <button class="btn primary" type="submit">문의 보내기</button>
        </div>
      </form>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>
<script src="/js/main.js"></script>
</body>
</html>
